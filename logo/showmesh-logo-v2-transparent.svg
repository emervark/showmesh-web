<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1000"
  height="700"
  viewBox="0 0 1000 700"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Showmesh logo v2 for dark surfaces</title>
  <desc id="desc">Transparent Showmesh logo with a green S-shaped cue path and three status dots.</desc>

  <g aria-label="Showmesh symbol">
    <path
      d="M 760 70
         H 300
         Q 236 70 236 134
         V 206
         Q 236 270 300 270
         H 700
         Q 764 270 764 334
         V 406
         Q 764 470 700 470
         H 240"
      fill="none"
      stroke="#32C96B"
      stroke-width="48"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <circle cx="480" cy="70" r="38" fill="#FF625D" />
    <circle cx="764" cy="370" r="38" fill="#35C8E0" />
    <circle cx="520" cy="470" r="38" fill="#FFB52E" />
  </g>

  <text
    x="500"
    y="658"
    fill="#F7F6F2"
    font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="130"
    font-weight="600"
    letter-spacing="-4"
    text-anchor="middle"
  >Showmesh</text>
</svg>
